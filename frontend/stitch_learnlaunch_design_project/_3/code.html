<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LearnLaunch - 登录到你的未来实验室</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",

          extend: {

                    "on-secondary-fixed": "#373f51",
                    "on-surface-variant": "#596064",
                    "background": "#f8f9fb",
                    "error-container": "#fa746f",
                    "outline": "#747c80",
                    "on-error": "#fff7f6",
                    "secondary-fixed": "#dae2f9",
                    "tertiary-fixed-dim": "#d1beee",
                    "inverse-surface": "#0b0f10",
                    "on-error-container": "#6e0a12",
                    "error": "#a83836",
                    "tertiary-dim": "#5b4c75",
                    "on-primary-fixed-variant": "#003671",
                    "secondary-container": "#dae2f9",
                    "on-secondary": "#f8f8ff",
                    "surface-bright": "#f8f9fb",
                    "on-primary-fixed": "#001431",
                    "primary": "#2c5ea7",
                    "on-tertiary-container": "#50426a",
                    "primary-fixed": "#81aefd",
                    "tertiary-container": "#dfccfd",
                    "primary-dim": "#1b529b",
                    "on-background": "#2c3437",
                    "tertiary-fixed": "#dfccfd",
                    "outline-variant": "#acb3b7",
                    "surface-variant": "#dce4e8",
                    "primary-container": "#81aefd",
                    "surface-tint": "#2c5ea7",
                    "on-secondary-container": "#495264",
                    "inverse-primary": "#81aefd",
                    "primary-fixed-dim": "#73a1ef",
                    "inverse-on-surface": "#9a9d9f",
                    "on-tertiary-fixed-variant": "#5a4b74",
                    "surface": "#f8f9fb",
                    "secondary": "#565f72",
                    "tertiary": "#675882",
                    "on-surface": "#2c3437",
                    "surface-container": "#eaeff2",
                    "on-tertiary": "#fef7ff",
                    "on-primary": "#f8f8ff",
                    "surface-container-highest": "#dce4e8",
                    "error-dim": "#67040d",
                    "surface-container-high": "#e3e9ed"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fb;
            color: #2c3437;
        }
        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Subtle Architectural Grid Background -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] overflow-hidden">
<div class="absolute inset-0" style="background-image: linear-gradient(#2c5ea7 1px, transparent 1px), linear-gradient(90deg, #2c5ea7 1px, transparent 1px); background-size: 100px 100px;"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-screen-2xl px-8 lg:px-24 flex flex-col md:flex-row items-center md:items-stretch justify-between gap-16">
<!-- Branding Section (Asymmetric Rationalism) -->
<section class="flex-1 flex flex-col justify-center max-w-xl">
<header class="mb-12">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="architecture">architecture</span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface">LearnLaunch</h1>
</div>
<h2 class="font-headline text-5xl md:text-6xl font-light leading-tight text-on-surface tracking-tighter">
                    登录到你的<br/>
<span class="font-medium text-primary">未来实验室</span>
</h2>
<p class="mt-8 text-on-surface-variant font-body text-lg max-w-md leading-relaxed border-l-2 border-primary/20 pl-6">
                    Academic efficiency through structured inquiry. Your research workbench awaits activation.
                </p>
</header>
<!-- Secondary Decorative Visual -->
<div class="hidden lg:block mt-12 overflow-hidden h-48 w-full grayscale opacity-40 hover:grayscale-0 transition-all duration-700">
<img class="w-full h-full object-cover" data-alt="Modern architectural interior of a minimalist university library with clean lines and soft natural daylight pouring in" src="https://lh3.googleusercontent.com/aida-public/AB6AXuByQ9h9jskctgDYBtMPI5NwPUajyaC5YotUuZS2QiSsxXmCAw3_TY7qu-i80PG2nX1uIVOkuDxkShYZ5ALwl-aZW8SpRHo1Zllik0xOZK0lbFtrOsJ-nk-wqXa1Suw8awLcNL4ZbwNv0QNaOvYNuRfj8E5FLvXuUcw96ZqxsHYUOX7ufCyyWvun9XH7C6cs2ZbH5_HLFvptQn-QEEWVl4kYghbayVu6BIB7h218CKTORMGcVSoULCIXvBJezbBE1fNyHXcyAnbWMGc0"/>
</div>
</section>
<!-- Form Section (Minimalist Line Separation) -->
<section class="flex-1 flex flex-col justify-center max-w-md w-full">
<form class="space-y-10">
<!-- Username Field -->
<div class="group">
<label class="block font-headline text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-3 group-focus-within:text-primary transition-colors" for="student_id">
                        Student ID / Email
                    </label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 focus:ring-0 focus:border-primary text-on-surface placeholder:text-outline-variant/50 font-body transition-all" id="student_id" name="student_id" placeholder="researcher@university.edu" type="text"/>
<div class="absolute right-0 top-4 opacity-30 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-headline text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-3 group-focus-within:text-primary transition-colors" for="password">
                        Access Credentials
                    </label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 focus:ring-0 focus:border-primary text-on-surface placeholder:text-outline-variant/50 font-body transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute right-0 top-4 opacity-30 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="key">key</span>
</div>
</div>
</div>
<!-- Action Bar -->
<div class="pt-6 flex flex-col gap-6">
<button class="w-full py-4 bg-primary text-on-primary font-headline font-medium rounded-lg hover:bg-primary-dim active:scale-[0.99] transition-all flex items-center justify-center gap-3" type="submit">
                        Initialise Session
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center justify-between font-label text-xs tracking-wide">
<a class="text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">
                            Forgot Authentication?
                        </a>
<span class="text-outline-variant">|</span>
<a class="text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">
                            Request Academic Access
                        </a>
</div>
</div>
</form>
<!-- Bottom Footnote -->
<footer class="mt-24 pt-8 border-t border-outline-variant/10 text-[10px] font-label text-outline uppercase tracking-[0.2em]">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    Central System Operational: V2.4.0
                </div>
</footer>
</section>
</main>
<!-- Contextual Information (Right Aligned Overlay) -->
<div class="fixed right-8 bottom-8 text-right hidden xl:block pointer-events-none select-none">
<div class="font-headline text-[12rem] font-bold text-primary/5 leading-[0.8] mb-[-2rem]">LL</div>
<p class="text-xs font-label text-on-surface-variant uppercase tracking-widest opacity-20">Secure Intelligence Terminal</p>
</div>
</body></html>
